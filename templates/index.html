{% extends "base.html" %}

{% block title %}Start Booking{% endblock %}

{% block content %}
<div class="card">
  <h2>Booking & Payment Authority</h2>
  <form method="post" action="/start">
    <label>
      Full name
      <input type="text" name="name" required />
    </label>
    <label>
      Email
      <input type="email" name="email" required />
    </label>
    <label>
      Mobile (for Direct Debit link)
      <input type="tel" name="mobile" required />
    </label>
    <label>
      Booking ID (reference)
      <input type="text" name="booking_id" required />
    </label>
    <label>
      Amount (AUD)
      <input type="number" step="0.01" name="amount" required />
    </label>
    <button type="submit">Continue to Secure Payment Authority</button>
  </form>
</div>
{% endblock %}
